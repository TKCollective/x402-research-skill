# Server-side secret detection gate
# Blocks PRs/pushes that contain hardcoded API keys, tokens, or credentials.
# Covers the case where a contributor bypasses the local .githooks/pre-commit with --no-verify.
# Uses TruffleHog (https://github.com/trufflesecurity/trufflehog) — verifies secrets by calling
# the actual service, so it only flags real, active credentials (very low false-positive rate).

name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On pull_request: scan the diff between base and head
      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      # On push to main/master: scan the full repo (catches anything that slipped in)
      - name: Scan full repo on push
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified --only-verified
